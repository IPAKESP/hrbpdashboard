<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Pro HRBP Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* Animated Gradient Background */
        body {
            height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #ffffff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Moving Orbs for extra depth */
        .orb-1, .orb-2 {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1;
        }
        .orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; opacity: 0.6; }
        .orb-2 { width: 500px; height: 500px; background: #3b82f6; bottom: -150px; right: -100px; opacity: 0.5; }

        /* Main Glass Container */
        .glass-container {
            width: 95%; height: 92vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Glass */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            display: flex; flex-direction: column;
        }
        
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .logo span { color: #60a5fa; text-shadow: 0 0 10px rgba(96, 165, 250, 0.5); }

        .nav-item {
            padding: 15px 20px; margin-bottom: 10px; border-radius: 12px;
            color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 15px; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1); color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Main Dashboard Area */
        .main-content {
            flex: 1; padding: 30px 40px; overflow-y: auto;
        }
        
        /* Custom Scrollbar */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        
        /* Profile Chip */
        .profile {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 25px;
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .kpi-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-5px); }
        
        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
        }
        .card-1::before { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        .card-2::before { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .card-3::before { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .card-4::before { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }

        .kpi-title { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .kpi-value { font-size: 32px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Charts & Table Layout */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .glass-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; padding: 25px;
        }
        
        .glass-panel h3 { font-size: 16px; margin-bottom: 20px; font-weight: 500; color: rgba(255,255,255,0.9); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: rgba(255,255,255,0.5); font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 15px 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
        .status.ongoing { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status.pending { background: rgba(251, 191, 36, 0.2); color: #fde68a; border: 1px solid rgba(251, 191, 36, 0.3); }

    </style>
</head>
<body>

    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo">IPAK<span>HRBP</span></div>
            <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
            <div class="nav-item"><i class="fas fa-briefcase"></i> Positions</div>
            <div class="nav-item"><i class="fas fa-chart-pie"></i> Analytics</div>
            <div class="nav-item"><i class="fas fa-users"></i> Talent Pool</div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Overview</h1>
                <div class="profile">
                    <span>Hr Manager</span>
                    <div style="width:35px; height:35px; background:linear-gradient(45deg, #60a5fa, #3b82f6); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">HR</div>
                </div>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card card-1">
                    <div class="kpi-title">Pending Roles</div>
                    <div class="kpi-value">12</div>
                </div>
                <div class="kpi-card card-2">
                    <div class="kpi-title">Ongoing Hiring</div>
                    <div class="kpi-value">28</div>
                </div>
                <div class="kpi-card card-3">
                    <div class="kpi-title">Time to Fill</div>
                    <div class="kpi-value">24d</div>
                </div>
                <div class="kpi-card card-4">
                    <div class="kpi-title">Turnover Rate</div>
                    <div class="kpi-value">4.2%</div>
                </div>
            </div>

            <div class="bottom-grid">
                <div class="glass-panel">
                    <h3>Turnover Trend (YTD)</h3>
                    <canvas id="glassChart" height="150"></canvas>
                </div>
                
                <div class="glass-panel">
                    <h3>Pipeline Status</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ROLE</th>
                                <th>DEPT</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Glassmorphism Chart.js Setup
        Chart.defaults.color = 'rgba(255, 255, 255, 0.6)';
        Chart.defaults.font.family = "'Poppins', sans-serif";

        const ctx = document.getElementById('glassChart').getContext('2d');
        
        // Create Gradient for Chart Line
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(96, 165, 250, 0.5)');   
        gradient.addColorStop(1, 'rgba(96, 165, 250, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Turnover %',
                    data: [5.2, 4.8, 5.0, 4.5, 4.3, 4.2],
                    borderColor: '#60a5fa',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4, // smooth curves
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#60a5fa',
                    pointBorderWidth: 2,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false, drawBorder: false } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false } }
                }
            }
        });

        // Table Data Injection
        const data = [
            { role: "Backend Lead", dept: "Engineering", status: "Ongoing" },
            { role: "Brand Manager", dept: "Marketing", status: "Pending" },
            { role: "Data Scientist", dept: "Analytics", status: "Ongoing" },
            { role: "HR Exec", dept: "People", status: "Pending" }
        ];

        const tbody = document.getElementById('table-body');
        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.role}</td>
                    <td>${item.dept}</td>
                    <td><span class="status ${item.status.toLowerCase()}">${item.status}</span></td>
                </tr>
            `;
        });
    </script>
</body>
</html>
