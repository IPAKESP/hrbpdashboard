<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Clean White HRBP Dashboard (Premium UI)</title>

    <!-- Google Fonts: Outfit (Display) & Inter (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Premium UI Variables */
            --ink: #0F172A;
            --ink-2: #1E293B;
            --ink-3: #334155;
            --muted: #64748B;
            --muted-2: #94A3B8;
            --bg: #F8FAFC;
            --brand-purple: #7C3AED;
            --brand-blue: #2563EB;
            --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --border: rgba(226, 232, 240, 0.8);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --shadow-sm: 0 2px 8px rgba(15,23,42,0.04);
            --shadow-card: 0 16px 40px -10px rgba(15,23,42,0.08);
            --shadow-glow: 0 10px 25px -5px rgba(37,99,235,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(rgba(148,163,184,0.15) 1px, transparent 1px),
                linear-gradient(180deg, #fff 0%, var(--bg) 100%);
            background-size: 32px 32px, 100% 100%;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted-2); border-radius: 10px; }

        /* Spotlight Effect for Cards */
        .interactive-card { position: relative; overflow: hidden; }
        .interactive-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient( 600px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(37, 99, 235, 0.08), transparent 40% );
            z-index: 1; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
        }
        .interactive-card:hover::before { opacity: 1; }
        .interactive-card > * { position: relative; z-index: 2; }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 16px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .nav-brand { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -0.5px; }
        .nav-brand span { color: var(--brand-blue); }
        
        .profile-chip { display: flex; align-items: center; gap: 12px; background: white; padding: 6px 16px 6px 6px; border-radius: 100px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); cursor: pointer; transition: 0.3s; }
        .profile-chip:hover { border-color: rgba(37,99,235,0.3); }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--brand-gradient); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: white; font-size: 16px; }
        .profile-name { font-size: 14px; font-weight: 600; color: var(--ink-2); }

        /* Layout */
        .page-wrapper { padding-top: 70px; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Filters */
        .sidebar {
            width: 280px; flex-shrink: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 24px 20px; overflow-y: auto;
        }
        .sidebar-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 24px; }
        
        .filter-group { margin-bottom: 20px; }
        .filter-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-2); margin-bottom: 8px; display: block; }
        .filter-select { 
            width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); 
            background: white; border: 1px solid var(--border); border-radius: 10px; 
            padding: 10px 12px; outline: none; transition: 0.3s; box-shadow: var(--shadow-sm); cursor: pointer;
        }
        .filter-select:focus, .filter-select:hover { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .btn-reset { width: 100%; background: var(--ink); color: white; font-family: var(--font-body); font-size: 14px; font-weight: 600; padding: 12px; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reset:hover { background: var(--brand-blue); box-shadow: var(--shadow-glow); }

        /* Main Content */
        .main-content { flex: 1; padding: 28px 36px; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; }
        .main-content::-webkit-scrollbar { display: none; }

        .header h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--ink); }
        .header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

        /* KPI Grid (Updated to 3 columns) */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .kpi-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); transition: 0.3s; }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); border-color: rgba(37,99,235,0.2); }
        .kpi-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 16px; }
        .i-pending { background: rgba(245,158,11,0.1); color: #F59E0B; }
        .i-ongoing { background: rgba(37,99,235,0.1); color: #2563EB; }
        .i-ttf { background: rgba(16,185,129,0.1); color: #10B981; }
        .kpi-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .kpi-value { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--ink); display: flex; align-items: baseline; gap: 4px; }
        .kpi-value span { font-size: 14px; font-weight: 600; color: var(--muted-2); }

        /* Middle Section: Header */
        .section-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow-sm); flex: 1; display: flex; flex-direction: column; }
        .section-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 20px; }

        /* Sheet Data List (hire95 Style) */
        .cand-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto;}
        .cand-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s; position: relative; overflow: hidden; box-shadow: var(--shadow-sm); }
        .cand-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: 0.3s; }
        .cand-card:hover { border-color: rgba(37,99,235,0.2); box-shadow: var(--shadow-card); transform: translateX(2px); }
        .cand-card:hover::after { background: var(--brand-gradient); }

        .data-info { flex: 1; }
        .data-role { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
        .data-meta { font-size: 13px; color: var(--muted); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 5px; }
        
        .status-badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-badge.Ongoing { background: rgba(37,99,235,0.1); color: #2563EB; border: 1px solid rgba(37,99,235,0.2); }
        .status-badge.Pending { background: rgba(245,158,11,0.1); color: #F59E0B; border: 1px solid rgba(245,158,11,0.2); }
        .status-badge.Closed { background: rgba(16,185,129,0.1); color: #10B981; border: 1px solid rgba(16,185,129,0.2); }
        .status-badge.default { background: #F1F5F9; color: var(--ink-2); border: 1px solid var(--border); }

        .loading-state { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
        .loading-state i { font-size: 24px; margin-bottom: 10px; color: var(--brand-blue); }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">IPAK<span>.HRBP</span></div>
        <div class="profile-chip">
            <div class="avatar">A</div>
            <span class="profile-name">Anser Ali Shah</span>
        </div>
    </nav>

    <div class="page-wrapper">
        
        <!-- Sidebar Filters -->
        <aside class="sidebar interactive-card">
            <div class="sidebar-title">Data Filters</div>
            
            <div class="filter-group">
                <label class="filter-label">Company</label>
                <select id="flt-company" class="filter-select" onchange="applyFilters()"><option value="All">All Companies</option></select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Department</label>
                <select id="flt-department" class="filter-select" onchange="applyFilters()"><option value="All">All Departments</option></select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Section</label>
                <select id="flt-section" class="filter-select" onchange="applyFilters()"><option value="All">All Sections</option></select>
            </div>
            <div class="filter-group">
                <label class="filter-label">HRBP</label>
                <select id="flt-hrbp" class="filter-select" onchange="applyFilters()"><option value="All">All HRBPs</option></select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Status</label>
                <select id="flt-status" class="filter-select" onchange="applyFilters()"><option value="All">All Statuses</option></select>
            </div>

            <button class="btn-reset" onclick="resetFilters()">Reset Filters</button>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            
            <header class="header">
                <p>Welcome back, Manager of Planning</p>
                <h1>Planning & Dispatch Overview</h1>
            </header>

            <!-- KPIs -->
            <div class="kpi-grid">
                <div class="interactive-card kpi-card">
                    <div class="kpi-icon i-pending"><i class="fas fa-hourglass-half"></i></div>
                    <div class="kpi-title">Pending Roles</div>
                    <div class="kpi-value" id="kpi-pending">0</div>
                </div>
                <div class="interactive-card kpi-card">
                    <div class="kpi-icon i-ongoing"><i class="fas fa-sync fa-spin-pulse"></i></div>
                    <div class="kpi-title">Ongoing Hiring</div>
                    <div class="kpi-value" id="kpi-ongoing">0</div>
                </div>
                <div class="interactive-card kpi-card">
                    <div class="kpi-icon i-ttf"><i class="fas fa-calendar-check"></i></div>
                    <div class="kpi-title">Avg Time to Fill</div>
                    <div class="kpi-value" id="kpi-ttf">0<span>days</span></div>
                </div>
            </div>

            <!-- Google Sheets Data Section -->
            <div class="section-card interactive-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="section-title" style="margin: 0;">Requisitions Database</div>
                    <span id="record-count" style="font-size: 13px; font-weight: 600; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 8px;">Fetching...</span>
                </div>
                
                <div id="loading-spinner" class="loading-state">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <p>Syncing with Google Sheets...</p>
                </div>

                <div class="cand-list" id="sheet-data-list">
                    <!-- Data will be populated here via JS -->
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- 1. Spotlight Effect Init ---
        function initSpotlight() {
            document.querySelectorAll('.interactive-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                });
            });
        }
        initSpotlight();

        // --- 2. Google Sheets Fetch & Dynamic Logic ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpF4BWFF-0qExGjvRqxqFZrF7t4lqtWmwB1gpTZS111ti5OT71yTkK1jOT4yquRDZHRScgW8dZNeWY/pub?output=csv";
        
        let allData = [];
        let filterOptions = { Company: new Set(), Department: new Set(), Section: new Set(), HRBP: new Set(), Status: new Set() };

        // Basic CSV Parser
        function parseCSV(text) {
            const rows = [];
            let row = [], val = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') inQuotes = !inQuotes;
                else if (c === ',' && !inQuotes) { row.push(val.trim()); val = ''; }
                else if (c === '\n' && !inQuotes) { row.push(val.trim()); rows.push(row); row = []; val = ''; }
                else val += c;
            }
            if (val) row.push(val.trim());
            if (row.length > 0) rows.push(row);
            return rows;
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = parseCSV(data);
                
                if (rows.length < 2) throw new Error("No data found");

                const headers = rows[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g, ''));
                
                // Map columns
                const colMap = {
                    company: headers.findIndex(h => h.includes('company')),
                    department: headers.findIndex(h => h.includes('department')),
                    section: headers.findIndex(h => h.includes('section')),
                    hrbp: headers.findIndex(h => h.includes('hrbp')),
                    status: headers.findIndex(h => h.includes('status')),
                    role: headers.findIndex(h => h.includes('role') || h.includes('position') || h.includes('title')),
                    ttf: headers.findIndex(h => h.includes('time') || h.includes('days') || h.includes('ttf') || h.includes('duration'))
                };

                allData = rows.slice(1).filter(r => r.length > 1).map(row => {
                    let item = {
                        Role: colMap.role >= 0 ? row[colMap.role] : (row[0] || 'Unknown Role'),
                        Company: colMap.company >= 0 ? row[colMap.company] : 'N/A',
                        Department: colMap.department >= 0 ? row[colMap.department] : 'N/A',
                        Section: colMap.section >= 0 ? row[colMap.section] : 'N/A',
                        HRBP: colMap.hrbp >= 0 ? row[colMap.hrbp] : 'N/A',
                        Status: colMap.status >= 0 ? row[colMap.status] : 'Pending',
                        TTF: colMap.ttf >= 0 ? (parseInt(row[colMap.ttf]) || 0) : 0
                    };

                    if(item.Company) filterOptions.Company.add(item.Company);
                    if(item.Department) filterOptions.Department.add(item.Department);
                    if(item.Section) filterOptions.Section.add(item.Section);
                    if(item.HRBP) filterOptions.HRBP.add(item.HRBP);
                    if(item.Status) filterOptions.Status.add(item.Status);

                    return item;
                });

                populateFilters();
                applyFilters(); // Apply initial filter to render list & update KPIs

            } catch (error) {
                console.error("Error fetching sheet:", error);
                document.getElementById('loading-spinner').innerHTML = `<p style="color:red;">Failed to load data. Please ensure the Google Sheet is published to the web.</p>`;
            }
        }

        function populateFilters() {
            const populate = (id, set) => {
                const select = document.getElementById(id);
                [...set].sort().forEach(val => {
                    if (val && val !== 'N/A') {
                        let opt = document.createElement('option');
                        opt.value = val; opt.textContent = val;
                        select.appendChild(opt);
                    }
                });
            };
            populate('flt-company', filterOptions.Company);
            populate('flt-department', filterOptions.Department);
            populate('flt-section', filterOptions.Section);
            populate('flt-hrbp', filterOptions.HRBP);
            populate('flt-status', filterOptions.Status);
        }

        function updateKPIs(data) {
            let pendingCount = 0;
            let ongoingCount = 0;
            let totalTtf = 0;
            let ttfRecords = 0;

            data.forEach(item => {
                let statusLower = item.Status.toLowerCase();
                
                // Count Pending
                if (statusLower.includes('pending')) {
                    pendingCount++;
                } 
                // Count Ongoing / Active
                else if (statusLower.includes('ongoing') || statusLower.includes('active') || statusLower.includes('progress')) {
                    ongoingCount++;
                }

                // Average Time to Fill (TTF)
                if (item.TTF > 0) {
                    totalTtf += item.TTF;
                    ttfRecords++;
                }
            });

            let avgTtf = ttfRecords > 0 ? Math.round(totalTtf / ttfRecords) : 0;

            // Update UI
            document.getElementById('kpi-pending').innerText = pendingCount;
            document.getElementById('kpi-ongoing').innerText = ongoingCount;
            document.getElementById('kpi-ttf').innerHTML = `${avgTtf}<span>days</span>`;
        }

        function applyFilters() {
            const fComp = document.getElementById('flt-company').value;
            const fDept = document.getElementById('flt-department').value;
            const fSec = document.getElementById('flt-section').value;
            const fHrbp = document.getElementById('flt-hrbp').value;
            const fStat = document.getElementById('flt-status').value;

            const filtered = allData.filter(item => {
                return (fComp === 'All' || item.Company === fComp) &&
                       (fDept === 'All' || item.Department === fDept) &&
                       (fSec === 'All' || item.Section === fSec) &&
                       (fHrbp === 'All' || item.HRBP === fHrbp) &&
                       (fStat === 'All' || item.Status === fStat);
            });
            
            updateKPIs(filtered);
            renderDataList(filtered);
        }

        function resetFilters() {
            document.querySelectorAll('.filter-select').forEach(el => el.value = 'All');
            applyFilters();
        }

        function renderDataList(data) {
            document.getElementById('loading-spinner').style.display = 'none';
            const list = document.getElementById('sheet-data-list');
            document.getElementById('record-count').textContent = `${data.length} Records`;
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = `<div class="loading-state">No matching records found based on your filters.</div>`;
                return;
            }

            data.forEach(item => {
                let statusClass = "default";
                if (item.Status.toLowerCase().includes("ongoing") || item.Status.toLowerCase().includes("active")) statusClass = "Ongoing";
                if (item.Status.toLowerCase().includes("pending")) statusClass = "Pending";
                if (item.Status.toLowerCase().includes("closed") || item.Status.toLowerCase().includes("filled")) statusClass = "Closed";

                list.insertAdjacentHTML('beforeend', `
                    <div class="cand-card interactive-card">
                        <div class="data-info">
                            <div class="data-role">${item.Role}</div>
                            <div class="data-meta">
                                <span class="meta-item"><i class="fas fa-building" style="color:var(--muted-2)"></i> ${item.Company}</span>
                                <span style="color:var(--border)">|</span>
                                <span class="meta-item"><i class="fas fa-network-wired" style="color:var(--muted-2)"></i> ${item.Department} (${item.Section})</span>
                                <span style="color:var(--border)">|</span>
                                <span class="meta-item"><i class="fas fa-user-tie" style="color:var(--muted-2)"></i> HRBP: ${item.HRBP}</span>
                                ${item.TTF > 0 ? `<span style="color:var(--border)">|</span><span class="meta-item"><i class="fas fa-clock" style="color:var(--muted-2)"></i> ${item.TTF} Days</span>` : ''}
                            </div>
                        </div>
                        <div>
                            <span class="status-badge ${statusClass}">${item.Status}</span>
                        </div>
                    </div>
                `);
            });
            initSpotlight(); 
        }

        // Init Fetch
        fetchSheetData();

    </script>
</body>
</html>
