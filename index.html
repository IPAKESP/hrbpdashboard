<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK | HRBP Dashboard</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-color: #1e293b;
            --text-light: #ffffff;
            --text-dark: #334155;
            --accent: #3b82f6;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { display: flex; background: var(--bg-color); min-height: 100vh; }

        /* Sidebar Styling */
        aside { width: 260px; background: var(--sidebar-color); color: var(--text-light); padding: 20px; }
        aside h2 { font-size: 1.5rem; margin-bottom: 40px; color: var(--accent); }
        aside nav ul { list-style: none; }
        aside nav li { padding: 15px 0; border-bottom: 1px solid #334155; cursor: pointer; transition: 0.3s; }
        aside nav li:hover { color: var(--accent); }

        /* Main Content */
        main { flex: 1; padding: 30px; }
        header { display: flex; justify-content: space-between; margin-bottom: 30px; }

        /* KPI Cards Grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .kpi-card h3 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-card p { font-size: 1.8rem; font-weight: bold; color: var(--text-dark); }

        /* Table Section */
        .data-section { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: var(--text-dark); }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .ongoing { background: #dbeafe; color: #1e40af; }
        .pending { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

    <aside>
        <h2>IPAK HRBP</h2>
        <nav>
            <ul>
                <li>Dashboard</li>
                <li>Recruitment Pipeline</li>
                <li>Employee Turnover</li>
                <li>Reports</li>
                <li>Settings</li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Overview</h1>
            <button style="padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 8px;">+ New Job Req</button>
        </header>

        <section class="dashboard-grid">
            <div class="kpi-card"><h3>Pending</h3><p>12</p></div>
            <div class="kpi-card"><h3>Ongoing</h3><p>28</p></div>
            <div class="kpi-card"><h3>Avg Time to Fill</h3><p>32 Days</p></div>
            <div class="kpi-card"><h3>Turnover Rate</h3><p>4.2%</p></div>
        </section>

        <section class="data-section">
            <h2>Active Recruitment Status</h2>
            <table>
                <thead>
                    <tr>
                        <th>Position Title</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Days Open</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const jobs = [
            { title: "Senior Developer", dept: "IT", status: "Ongoing", days: 14 },
            { title: "Marketing Lead", dept: "Marketing", status: "Pending", days: 5 },
            { title: "Finance Analyst", dept: "Finance", status: "Ongoing", days: 22 },
        ];

        const tbody = document.getElementById('table-body');
        jobs.forEach(job => {
            tbody.innerHTML += `
                <tr>
                    <td>${job.title}</td>
                    <td>${job.dept}</td>
                    <td><span class="status-pill ${job.status.toLowerCase()}">${job.status}</span></td>
                    <td>${job.days}</td>
                </tr>
            `;
        });
    </script>
</body>
</html>
